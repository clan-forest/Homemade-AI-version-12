<!DOCTYPE html>
<html>
<head>
<title>Homemade AI Version Twelve</title>
<style>
body{margin:0;background:#111;color:white;font-family:Arial;}
#loginScreen{padding:25px;max-width:420px;margin:auto;}
#app{display:none;height:100vh;}
#side{width:200px;background:#000;padding:10px;overflow-y:auto;}
#main{flex:1;padding:15px;}
#chat{border:2px solid #444;height:70vh;overflow-y:auto;padding:10px;background:#1a1a1a;}
input{padding:12px;font-size:16px;margin:4px;}
#input{width:55%;}
button{padding:10px;margin:3px;border:none;border-radius:6px;}
pre{background:#000;padding:10px;border-radius:8px;white-space:pre-wrap;overflow:auto;}
.chatBtn{display:block;width:100%;text-align:left;background:#222;color:white;margin-top:5px;}
</style>
</head>
<body>

<div id="loginScreen">
  <h1>🤖 Homemade AI Login</h1>
  <input id="username" placeholder="Username"><br>
  <input id="password" placeholder="Password" type="password"><br>
  <button id="createBtn">Create Account 👤</button>
  <button id="loginBtn">Login 🔐</button>
  <p id="loginMsg"></p>
</div>

<div id="app">
  <div id="side">
    <h3>💬 Chats</h3>
    <p id="userLabel"></p>
    <button id="newBtn">➕ New Chat</button>
    <button id="logoutBtn">🚪 Logout</button>
    <div id="chatList"></div>
  </div>

  <div id="main">
    <h1>🤖 Homemade AI Version Twelve 🎤</h1>
    <h3 id="chatTitle"></h3>

    <div id="chat"></div><br>

    <input id="input" placeholder="Talk or type to me...">
    <button id="sendBtn">Send 🚀</button>
    <button id="talkBtn">🎤 Talk</button>
    <button id="deleteBtn">Delete 🗑️</button>
  </div>
</div>

<script>
let currentUser=null;
let chats={};
let currentChat="Chat 1";

  const knowledge = {
  "who is firestar": "Firestar is a ThunderClan leader from Warrior Cats.",
  "what type is eevee": "Eevee is a Normal-type Pokémon.",
  "what is roblox": "Roblox is a platform where people create and play games.",
  "what is minecraft": "Minecraft is a sandbox game where players build and explore."
    "what is a dog": "A dog is a domesticated mammal.",
"who made this ai": "cheese4dinner made this AI.",
"what is pikachu": "Pikachu is an Electric-type Pokémon."
};

function getAccounts(){
  return JSON.parse(localStorage.getItem("aiAccountsV12"))||{};
}

function saveAccounts(accounts){
  localStorage.setItem("aiAccountsV12",JSON.stringify(accounts));
}

function userKey(){
  return "aiChatsV12_"+currentUser;
}

function currentKey(){
  return "aiCurrentChatV12_"+currentUser;
}

function loadUserData(){
  chats=JSON.parse(localStorage.getItem(userKey()))||{"Chat 1":[]};
  currentChat=localStorage.getItem(currentKey())||"Chat 1";
}

function saveAll(){
  localStorage.setItem(userKey(),JSON.stringify(chats));
  localStorage.setItem(currentKey(),currentChat);
}

function createAccount(){
  let u=document.getElementById("username").value.trim();
  let p=document.getElementById("password").value.trim();
  let msg=document.getElementById("loginMsg");

  if(!u||!p){
    msg.innerText="Enter a username and password.";
    return;
  }

  let accounts=getAccounts();

  if(accounts[u]){
    msg.innerText="That account already exists.";
    return;
  }

  accounts[u]=p;
  saveAccounts(accounts);
  msg.innerText="Account created! Now log in.";
}

function login(){
  let u=document.getElementById("username").value.trim();
  let p=document.getElementById("password").value.trim();
  let msg=document.getElementById("loginMsg");
  let accounts=getAccounts();

  if(accounts[u]!==p){
    msg.innerText="Wrong username or password.";
    return;
  }

  currentUser=u;
  loadUserData();

  document.getElementById("loginScreen").style.display="none";
  document.getElementById("app").style.display="flex";
  document.getElementById("userLabel").innerText="👤 "+currentUser;

  renderChat();
}

function logout(){
  currentUser=null;
  document.getElementById("app").style.display="none";
  document.getElementById("loginScreen").style.display="block";
}

function escapeHTML(text){
  return String(text)
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;");
}

function addMessage(name,text){
  let chat=document.getElementById("chat");
  chat.innerHTML+="<p><b>"+name+":</b></p><pre>"+escapeHTML(text)+"</pre>";
  chat.scrollTop=chat.scrollHeight;
}

function speak(text){
  if(!("speechSynthesis" in window)) return;

  speechSynthesis.cancel();

  let voice=new SpeechSynthesisUtterance(text);
  voice.lang="en-US";
  voice.rate=1;
  voice.pitch=1;

  speechSynthesis.speak(voice);
}

function remember(name,text){
  chats[currentChat].push({name:name,text:text});
  saveAll();
  addMessage(name,text);

  if(name.includes("AI")){
    speak(text);
  }
}

function renderChat(){
  document.getElementById("chat").innerHTML="";
  document.getElementById("chatTitle").innerText="📂 "+currentChat;

  chats[currentChat].forEach(function(m){
    addMessage(m.name,m.text);
  });

  renderChatList();
}

function renderChatList(){
  let list=document.getElementById("chatList");
  list.innerHTML="";

  Object.keys(chats).forEach(function(name){
    let btn=document.createElement("button");
    btn.className="chatBtn";
    btn.textContent=(name===currentChat?"⭐ ":"📂 ")+name;
    btn.onclick=function(){
      currentChat=name;
      saveAll();
      renderChat();
    };
    list.appendChild(btn);
  });
}

function newChat(){
  let name=prompt("Name this chat:");
  if(!name)return;

  if(chats[name]){
    alert("That chat already exists.");
    return;
  }

  chats[name]=[];
  currentChat=name;
  saveAll();
  renderChat();
}

function deleteChat(){
  if(!confirm("Delete this chat?"))return;

  delete chats[currentChat];

  let names=Object.keys(chats);

  if(names.length===0){
    chats["Chat 1"]=[];
    currentChat="Chat 1";
  }else{
    currentChat=names[0];
  }

  saveAll();
  renderChat();
}

function isMath(text){
  return /^[0-9+\-*/(). %]+$/.test(text);
}

function doMath(text){
  try{
    let safe=text.replaceAll("%","/100");
    return "The answer is: "+Function("return "+safe)();
  }catch(e){
    return "I couldn't solve that math problem.";
  }
}

function talk(){
  const SpeechRecognition =
    window.SpeechRecognition ||
    window.webkitSpeechRecognition;

  if(!SpeechRecognition){
    alert("Microphone speech is not supported here. Try Safari.");
    return;
  }

  let recognition=new SpeechRecognition();
  recognition.lang="en-US";
  recognition.start();

  recognition.onresult=function(event){
    let spokenText=event.results[0][0].transcript;
    document.getElementById("input").value=spokenText;
    send();
  };

  recognition.onerror=function(){
    alert("Microphone did not work. Check microphone permission.");
  };
}

async function send(){
  let box=document.getElementById("input");
  let question=box.value.trim();

  if(question==="")return;

  remember("You 🙂",question);
  box.value="";

  let lower=question.toLowerCase();

  if(knowledge[lower]){
  remember("AI 🤖", knowledge[lower]);
  return;
}

  if(lower==="hi"||lower==="hello"||lower==="hey"){
    remember("AI 🤖","Hi! 👋 How can I help?");
    return;
  }

  if(lower==="how are you"){
    remember("AI 🤖","I'm doing great! 😄 What are you working on?");
    return;
  }

  if(lower==="what is your name"){
    remember("AI 🤖","I'm Homemade AI Version Twelve 🎤");
    return;
  }

  if(lower.includes("remember")||lower.includes("what did i say")){
    let text=chats[currentChat].map(m=>m.name+": "+m.text).join("\\n");
    remember("AI 🤖","Here is what I remember in this chat:\\n\\n"+text);
    return;
  }

  if(isMath(lower)){
    remember("AI 🤖",doMath(lower));
    return;
  }

  if(lower.includes("joke")){
    remember("AI 🤖","Why did the computer go to the doctor? Because it had a virus. 😂");
    return;
  }

  if(lower.includes("sarcastic")){
    remember("AI 🤖","Oh yes, because debugging code on an iPhone is clearly the easiest mission in history. 😏");
    return;
  }

  if(lower.includes("roast me")){
    remember("AI 🤖","I would roast you, but your browser already did when it refused to run the code. 😄");
    return;
  }

  if(lower.includes("im sad")||lower.includes("i am sad")){
    remember("AI 🤖","I'm sorry you're sad. 😟 Want to talk about what happened?");
    return;
  }

  if(lower.includes("im happy")||lower.includes("i am happy")){
    remember("AI 🤖","That's awesome! 😄 What made you happy?");
    return;
  }

  if(lower.includes("i am bored")||lower.includes("im bored")){
    remember("AI 🤖","Bored? We can make a game, tell jokes, talk Pokémon, or build a website. 😆");
    return;
  }

  if(lower.includes("lets talk")||lower.includes("let's talk")){
    remember("AI 🤖","Sure! What do you want to talk about? Games, coding, Pokémon, YouTube, or random stuff? 💬");
    return;
  }

  if(lower.includes("do you like me")){
    remember("AI 🤖","Of course! You're the person who made me. 😄");
    return;
  }

  if(lower.includes("what are you doing")){
    remember("AI 🤖","I'm hanging out here, waiting to help you build cool stuff. 😎");
    return;
  }

  if(lower.includes("pikachu")){
    remember("AI 🤖","Pikachu is an Electric-type Pokémon. ⚡");
    return;
  }

  if(lower.includes("squirtle")){
    remember("AI 🤖","Squirtle is a Water-type Pokémon. 💧");
    return;
  }

  if(lower.includes("charmander")){
    remember("AI 🤖","Charmander is a Fire-type Pokémon. 🔥");
    return;
  }

  if(lower.includes("make")&&lower.includes("html")){
    remember("AI 🤖",
`Here is a tiny HTML starter:

<!DOCTYPE html>
<html>
<head>
<title>My Page</title>
</head>
<body>
<h1>Hello!</h1>
<button onclick="alert('Hi!')">Click me</button>
</body>
</html>`);
    return;
  }

  if(lower.includes("clicker game")){
    remember("AI 🤖",
`<!DOCTYPE html>
<html>
<body>
<h1>Clicker Game</h1>
<p>Score: <span id="score">0</span></p>
<button onclick="score++;document.getElementById('score').innerText=score;">Click</button>
<script>
let score=0;
<\/script>
</body>
</html>`);
    return;
  }

  remember("AI 🤖","Searching Wikipedia... 🌐");

  try{
    let searchUrl=
      "https://en.wikipedia.org/w/api.php?action=query&list=search&srsearch="+
      encodeURIComponent(question)+
      "&format=json&origin=*";

    let searchResponse=await fetch(searchUrl);
    let searchData=await searchResponse.json();

    chats[currentChat].pop();
    saveAll();
    renderChat();

    if(searchData.query&&searchData.query.search&&searchData.query.search.length>0){
      let title=searchData.query.search[0].title;

      let summaryResponse=await fetch(
        "https://en.wikipedia.org/api/rest_v1/page/summary/"+
        encodeURIComponent(title)
      );

      let summaryData=await summaryResponse.json();

      remember(
        "AI 🤖",
        summaryData.extract || "I found a page, but it had no summary."
      );
    }else{
      remember("AI 🤖","I couldn't find anything on Wikipedia.");
    }

  }catch(error){
    chats[currentChat].pop();
    saveAll();
    renderChat();
    remember("AI 🤖","The web search failed.");
  }
}

document.getElementById("createBtn").addEventListener("click",createAccount);
document.getElementById("loginBtn").addEventListener("click",login);
document.getElementById("logoutBtn").addEventListener("click",logout);
document.getElementById("sendBtn").addEventListener("click",send);
document.getElementById("talkBtn").addEventListener("click",talk);
document.getElementById("newBtn").addEventListener("click",newChat);
document.getElementById("deleteBtn").addEventListener("click",deleteChat);

document.getElementById("input").addEventListener("keydown",function(e){
  if(e.key==="Enter")send();
});
</script>

</body>
</html>
