<!DOCTYPE html>
<html>
<head>
<title>Homemade AI Version 14 Ultimate</title>
<style>
*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:linear-gradient(135deg,#0f1020,#17172b);
  color:white;
  font-family:Arial, sans-serif;
}

#loginScreen{
  max-width:420px;
  margin:80px auto;
  background:#1d1d32;
  padding:25px;
  border-radius:18px;
  box-shadow:0 0 25px rgba(0,0,0,.4);
  text-align:center;
}

#app{
  display:none;
  height:100vh;
}

#side{
  width:230px;
  background:#0a0a14;
  padding:15px;
  overflow-y:auto;
  border-right:2px solid #2d2d44;
}

#main{
  flex:1;
  padding:20px;
}

h1{
  color:#8fb3ff;
}

#chat{
  border:2px solid #2d2d44;
  height:70vh;
  overflow-y:auto;
  padding:15px;
  background:#181827;
  border-radius:16px;
}

input{
  padding:13px;
  font-size:16px;
  margin:5px;
  border:none;
  border-radius:10px;
  outline:none;
}

#input{
  width:58%;
}

button{
  padding:12px;
  margin:4px;
  border:none;
  border-radius:10px;
  background:#4b7cff;
  color:white;
  font-weight:bold;
}

button:hover{
  background:#6d95ff;
}

pre{
  background:#0b0b12;
  padding:12px;
  border-radius:12px;
  white-space:pre-wrap;
  overflow:auto;
  border:1px solid #2d2d44;
}

.chatBtn{
  display:block;
  width:100%;
  text-align:left;
  background:#1b1b2d;
  color:white;
  margin-top:7px;
}

.chatBtn:hover{
  background:#313154;
}

#loginMsg{
  color:#ffcc66;
}
</style>
</head>
<body>

<div id="loginScreen">
  <h1>🤖 Homemade AI Login</h1>
  <input id="username" placeholder="Username"><br>
  <input id="password" placeholder="Password" type="password"><br>
  <button id="createBtn">Create Account 👤</button>
  <button id="loginBtn">Login 🔐</button>
  <p id="loginMsg"></p>
</div>

<div id="app">
  <div id="side">
    <h3>💬 Chats</h3>
    <p id="userLabel"></p>
    <button id="newBtn">➕ New Chat</button>
    <button id="logoutBtn">🚪 Logout</button>
    <div id="chatList"></div>
  </div>

  <div id="main">
    <h1>🤖 Homemade AI Version 14 Ultimate 🧠</h1>
    <h3 id="chatTitle"></h3>
    <div id="chat"></div><br>
    <input id="input" placeholder="Ask me anything...">
    <button id="sendBtn">Send 🚀</button>
    <button id="deleteBtn">Delete 🗑️</button>
  </div>
</div>

<script>
let currentUser=null;
let chats={};
let currentChat="Chat 1";

function speak(text){
  if(!("speechSynthesis" in window)) return;

  speechSynthesis.cancel();

  let voice = new SpeechSynthesisUtterance(text);
  voice.lang = "en-US";
  voice.rate = 1;
  voice.pitch = 1;

  speechSynthesis.speak(voice);
}
  
function cleanText(text){
  return String(text).toLowerCase().trim().replace(/[?!.,]/g,"");
}

function smartAnswer(shortAnswer, extra){
  return shortAnswer +
    "\n\nHere's the simple version: " + extra +
    "\n\nAsk me if you want more details.";
}

const knowledge={
  "who is firestar":smartAnswer("Firestar is a ThunderClan leader from Warrior Cats.","He started as a kittypet named Rusty and became one of the most important cats in the series."),
  "what type is eevee":smartAnswer("Eevee is a Normal-type Pokémon.","Eevee can evolve into many different Pokémon."),
  "what is roblox":smartAnswer("Roblox is a game platform.","Players can create games, play games, and customize their characters."),
  "what is minecraft":smartAnswer("Minecraft is a sandbox game.","Players can build, craft, explore, survive, and create almost anything."),
  "what is a dog":smartAnswer("A dog is a domesticated mammal.","Dogs have lived with humans for thousands of years and are common pets."),
  "who made this ai":smartAnswer("cheese4dinner made this AI.","It is built using HTML, CSS, and JavaScript."),
  "what is pikachu":smartAnswer("Pikachu is an Electric-type Pokémon.","Pikachu is the mascot of Pokémon and is known for electric attacks."),
  "what is html":smartAnswer("HTML is the language used to build web pages.","HTML creates text, buttons, images, and page layouts."),
  "what is javascript":smartAnswer("JavaScript is a programming language.","It makes websites interactive and powers games, chat systems, and AI features."),
  "what is css":smartAnswer("CSS is used to style websites.","It controls colors, fonts, spacing, layouts, and how a page looks.")
};

function getAccounts(){return JSON.parse(localStorage.getItem("aiAccountsV14"))||{};}
function saveAccounts(accounts){localStorage.setItem("aiAccountsV14",JSON.stringify(accounts));}
function userKey(){return "aiChatsV14_"+currentUser;}
function currentKey(){return "aiCurrentChatV14_"+currentUser;}

function loadUserData(){
  chats=JSON.parse(localStorage.getItem(userKey()))||{"Chat 1":[]};
  currentChat=localStorage.getItem(currentKey())||"Chat 1";
}

function saveAll(){
  localStorage.setItem(userKey(),JSON.stringify(chats));
  localStorage.setItem(currentKey(),currentChat);
}

function createAccount(){
  let u=document.getElementById("username").value.trim();
  let p=document.getElementById("password").value.trim();
  let msg=document.getElementById("loginMsg");

  if(!u||!p){msg.innerText="Enter a username and password.";return;}

  let accounts=getAccounts();
  if(accounts[u]){msg.innerText="That account already exists.";return;}

  accounts[u]=p;
  saveAccounts(accounts);
  msg.innerText="Account created! Now log in.";
}

function login(){
  let u=document.getElementById("username").value.trim();
  let p=document.getElementById("password").value.trim();
  let msg=document.getElementById("loginMsg");
  let accounts=getAccounts();

  if(accounts[u]!==p){msg.innerText="Wrong username or password.";return;}

  currentUser=u;
  loadUserData();
  document.getElementById("loginScreen").style.display="none";
  document.getElementById("app").style.display="flex";
  document.getElementById("userLabel").innerText="👤 "+currentUser;
  renderChat();
}

function logout(){
  currentUser=null;
  document.getElementById("app").style.display="none";
  document.getElementById("loginScreen").style.display="block";
}

function escapeHTML(text){
  return String(text).replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;");
}

function addMessage(name,text){
  let chat=document.getElementById("chat");
  chat.innerHTML+="<p><b>"+name+":</b></p><pre>"+escapeHTML(text)+"</pre>";
  chat.scrollTop=chat.scrollHeight;
}

function remember(name,text){
  chats[currentChat].push({name:name,text:text});
  saveAll();
  addMessage(name,text);
}

function renderChat(){
  document.getElementById("chat").innerHTML="";
  document.getElementById("chatTitle").innerText="📂 "+currentChat;
  chats[currentChat].forEach(m=>addMessage(m.name,m.text));
  renderChatList();
}

function renderChatList(){
  let list=document.getElementById("chatList");
  list.innerHTML="";
  Object.keys(chats).forEach(function(name){
    let btn=document.createElement("button");
    btn.className="chatBtn";
    btn.textContent=(name===currentChat?"⭐ ":"📂 ")+name;
    btn.onclick=function(){currentChat=name;saveAll();renderChat();};
    list.appendChild(btn);
  });
}

function newChat(){
  let name=prompt("Name this chat:");
  if(!name)return;
  if(chats[name]){alert("That chat already exists.");return;}
  chats[name]=[];
  currentChat=name;
  saveAll();
  renderChat();
}

function deleteChat(){
  if(!confirm("Delete this chat?"))return;
  delete chats[currentChat];
  let names=Object.keys(chats);
  if(names.length===0){chats["Chat 1"]=[];currentChat="Chat 1";}
  else{currentChat=names[0];}
  saveAll();
  renderChat();
}

function isMath(text){return /^[0-9+\-*/(). %]+$/.test(text);}

function doMath(text){
  try{
    let safe=text.replaceAll("%","/100");
    return "The answer is: "+Function("return "+safe)();
  }catch(e){
    return "I couldn't solve that math problem.";
  }
}

async function searchBooks(question){
  try{
    let url="https://www.googleapis.com/books/v1/volumes?q="+encodeURIComponent(question);
    let response=await fetch(url);
    let data=await response.json();

    if(!data.items||data.items.length===0)return null;

    let answer="📚 Book titles I found:\n\n";
    data.items.slice(0,7).forEach(function(book,index){
      let info=book.volumeInfo;
      answer+=(index+1)+". "+(info.title||"No title")+"\n";
      if(info.authors)answer+="Author: "+info.authors.join(", ")+"\n";
      if(info.publishedDate)answer+="Published: "+info.publishedDate+"\n";
      answer+="\n";
    });
    return answer;
  }catch(e){return null;}
}

async function searchWikipedia(question){
  try{
    let searchUrl="https://en.wikipedia.org/w/api.php?action=query&list=search&srsearch="+encodeURIComponent(question)+"&format=json&origin=*";
    let searchResponse=await fetch(searchUrl);
    let searchData=await searchResponse.json();

    if(!(searchData.query&&searchData.query.search&&searchData.query.search.length>0))return null;

    let title=searchData.query.search[0].title;
    let summaryResponse=await fetch("https://en.wikipedia.org/api/rest_v1/page/summary/"+encodeURIComponent(title));
    let summaryData=await summaryResponse.json();

    return summaryData.extract||null;
  }catch(e){return null;}
}

async function send(){
  let box=document.getElementById("input");
  let question=box.value.trim();
  if(question==="")return;

  remember("You 🙂",question);
  box.value="";

  let lower=cleanText(question);

  if(knowledge[lower]){
    remember("AI 🤖",knowledge[lower]);
    return;
  }

  if(lower==="hi"||lower==="hello"||lower==="hey"){
    remember("AI 🤖","Hi! 👋 How can I help?");
    return;
  }

  if(lower==="how are you"){
    remember("AI 🤖","I'm doing great! 😄 What are you working on?");
    return;
  }

  if(lower==="what is your name"){
    remember("AI 🤖","I'm Homemade AI Version 14 Ultimate 🧠");
    return;
  }

  if(lower.includes("remember")||lower.includes("what did i say")){
    let text=chats[currentChat].map(m=>m.name+": "+m.text).join("\n");
    remember("AI 🤖","Here is what I remember in this chat:\n\n"+text);
    return;
  }

  if(isMath(lower)){
    remember("AI 🤖",doMath(lower));
    return;
  }

  if(lower.includes("joke")){
    remember("AI 🤖","Why did the computer go to the doctor? Because it had a virus. 😂");
    return;
  }

  if(lower.includes("sarcastic")){
    remember("AI 🤖","Oh yes, because debugging code on an iPhone is clearly the easiest mission in history. 😏");
    return;
  }

  if(lower.includes("roast me")){
    remember("AI 🤖","I would roast you, but your browser already did when it refused to run the code. 😄");
    return;
  }

  if(lower.includes("sad")){
    remember("AI 🤖","I'm sorry you're sad. 😟 Want to talk about what happened?");
    return;
  }

  if(lower.includes("happy")){
    remember("AI 🤖","That's awesome! 😄 What made you happy?");
    return;
  }

  if(lower.includes("bored")){
    remember("AI 🤖","Bored? We can make a game, tell jokes, talk Pokémon, or build a website. 😆");
    return;
  }

  if(lower.includes("lets talk")||lower.includes("let's talk")){
    remember("AI 🤖","Sure! What do you want to talk about? Games, coding, Pokémon, YouTube, or random stuff? 💬");
    return;
  }

  if(lower.includes("book")||lower.includes("books")||lower.includes("title")){
    remember("AI 🤖","Searching books... 📚");
    let result=await searchBooks(question);
    chats[currentChat].pop();saveAll();renderChat();
    remember("AI 🤖",result||"I couldn't find a book title for that.");
    return;
  }

  if(lower.includes("pikachu")){
    remember("AI 🤖","Pikachu is an Electric-type Pokémon. ⚡");
    return;
  }

  if(lower.includes("squirtle")){
    remember("AI 🤖","Squirtle is a Water-type Pokémon. 💧");
    return;
  }

  if(lower.includes("charmander")){
    remember("AI 🤖","Charmander is a Fire-type Pokémon. 🔥");
    return;
  }

  if(lower.includes("make")&&lower.includes("html")){
    remember("AI 🤖",
`Here is a tiny HTML starter:

<!DOCTYPE html>
<html>
<head>
<title>My Page</title>
</head>
<body>
<h1>Hello!</h1>
<button onclick="alert('Hi!')">Click me</button>
</body>
</html>`);
    return;
  }

  if(lower.includes("clicker game")){
    remember("AI 🤖",
`<!DOCTYPE html>
<html>
<body>
<h1>Clicker Game</h1>
<p>Score: <span id="score">0</span></p>
<button onclick="score++;document.getElementById('score').innerText=score;">Click</button>
<script>
let score=0;
<\/script>
</body>
</html>`);
    return;
  }

  remember("AI 🤖","Checking what I know, then searching Wikipedia... 🌐");
  let wiki=await searchWikipedia(question);
  chats[currentChat].pop();saveAll();renderChat();

  if(wiki){
    remember("AI 🤖",smartAnswer("I found this:",wiki));
  }else{
    remember("AI 🤖","I don't know that yet, and I couldn't find it on Wikipedia.");
  }
}

document.getElementById("createBtn").addEventListener("click",createAccount);
document.getElementById("loginBtn").addEventListener("click",login);
document.getElementById("logoutBtn").addEventListener("click",logout);
document.getElementById("sendBtn").addEventListener("click",send);
document.getElementById("newBtn").addEventListener("click",newChat);
document.getElementById("deleteBtn").addEventListener("click",deleteChat);

document.getElementById("input").addEventListener("keydown",function(e){
  if(e.key==="Enter")send();
});
</script>

</body>
</html>
